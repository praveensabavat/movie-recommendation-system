<!DOCTYPE html>
<html>

<head>

<title>Netflix Movie Recommender</title>

<style>

body{
background:#141414;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:red;
}

input{
padding:10px;
width:300px;
}

button{
padding:10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.movies{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin-top:30px;
}

.card{
margin:15px;
width:200px;
transition: transform 0.3s;
}

.card:hover{
transform: scale(1.1);
}

.card img{
width:100%;
border-radius:10px;
}

.card a{
color:white;
text-decoration:none;
}

.card a:hover{
color:red;
}

.rating{
color:gold;
}

</style>

<script>

async function suggest(){

let q=document.getElementById("movie").value

let res=await fetch("/suggest?q="+q)

let data=await res.json()

let list=document.getElementById("suggestions")

list.innerHTML=""

data.forEach(m=>{
let item=document.createElement("option")
item.value=m
list.appendChild(item)
})

}

</script>

</head>

<body>

<h1>NETFLIX MOVIE RECOMMENDER</h1>

<form method="POST">

<input list="suggestions" id="movie" name="movie" onkeyup="suggest()" placeholder="Search movie">

<datalist id="suggestions"></datalist>

<button type="submit">Recommend</button>

</form>

<div class="movies">

{% for movie in recommended %}

<div class="card">

<img src="{{movie.poster}}">

<h3>{{movie.title}}</h3>

<p class="rating">⭐ {{movie.rating}}</p>

<a href="/movie/{{movie.title}}">
<button>▶ Watch Trailer</button>
</a>

</div>

{% endfor %}

</div>

</body>

</html>
