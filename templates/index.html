<!DOCTYPE html>
<html>
<head>

<title>AI Movie Recommendation</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
}

h1{
color:red;
}

input{
width:350px;
padding:12px;
font-size:16px;
}

button{
background:red;
color:white;
padding:12px 25px;
border:none;
font-size:16px;
cursor:pointer;
}

.movies{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
margin-top:40px;
}

.movie-card{
text-align:center;
}

.movie-card img{
width:200px;
border-radius:6px;
}

.trailer-btn{
margin-top:10px;
background:red;
padding:8px 15px;
border:none;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>AI MOVIES</h1>

<h2>Movie Recommendation System</h2>

<form method="POST">

<input type="text" name="movie" placeholder="Enter movie name" required>

<br><br>

<button type="submit">Recommend</button>

</form>

{% if recommended %}

<h2 style="margin-top:40px;">Recommended Movies</h2>

<div class="movies">

{% for movie in recommended %}

<div class="movie-card">

<img src="{{ movie['poster'] }}">

<h3>{{ movie['title'] }}</h3>

<a href="{{ movie['trailer'] }}" target="_blank">

<button class="trailer-btn">Trailer</button>

</a>

</div>

{% endfor %}

</div>

{% endif %}

</body>

</html>
